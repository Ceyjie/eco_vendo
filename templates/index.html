<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAYCHARGE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ⋮ MENU BUTTON -->
<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<!-- MENU PANEL -->
<div id="menu-panel" class="menu-panel">
    <div class="menu-content">
        <h3>RAYCHARGE</h3>
        <p style="opacity:0.7;">Author</p>
        <b>Rochele Sala</b>
        <br><br>
        <button onclick="toggleMenu()" class="btn-insert" style="background:#333;">Close</button>
    </div>
</div>

<div class="main-container">
    <div class="logo-circle rainbow-animate" onclick="handleLogoClick()">
        <img src="{{ url_for('static', filename='logo.png') }}">
    </div>

    <!-- ✅ NAME CHANGED -->
    <h1 class="brand-name rainbow-animate">RAYCHARGE</h1>

    <div class="tagline">"Powered by rays, Designed for change"</div>

    <div id="timer-banner" class="timer-banner"></div>

    <div class="card">
        <div style="font-size:0.6rem; color:#444;">ID: {{ device_id }}</div>
        <div class="points-display">{{ points }} Points</div>
        <button class="btn-insert" onclick="startSession()">+ INSERT BOTTLES</button>
    </div>

    <div class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="slot-card"><b>Slot 1</b><button id="btn-slot-0" class="btn-redeem" onclick="openRedeemModal(0)">Redeem</button></div>
            <div class="slot-card"><b>Slot 2</b><button id="btn-slot-1" class="btn-redeem" onclick="openRedeemModal(1)">Redeem</button></div>
            <div class="slot-card"><b>Slot 3</b><button id="btn-slot-2" class="btn-redeem" onclick="openRedeemModal(2)">Redeem</button></div>
            <div class="slot-card"><b>AC 220V</b><button id="btn-slot-3" class="btn-redeem" onclick="openRedeemModal(3)">Redeem</button></div>
        </div>
    </div>

    <div class="card">
        <table style="width:100%; font-size:0.75rem; text-align:left;">
            {% for log in logs %}
            <tr>
                <td>{{ log[0] }}</td>
                <td style="color:var(--orange);font-weight:700;">{{ log[1] }}</td>
                <td style="text-align:right;opacity:0.5;">{{ log[2] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>

<!-- INSERT MODAL -->
<div id="insert-modal" class="modal-overlay">
    <div class="modal-content">
        <h2>INSERTING...</h2>
        <div id="live-count" style="font-size:5rem;color:var(--green);">0</div>
        <button class="btn-insert" style="background:red;" onclick="stopSession()">DONE</button>
    </div>
</div>

<!-- REDEEM MODAL -->
<div id="redeem-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>REDEEM</h3>
        <div style="display:flex; align-items:center; justify-content:center; margin:20px 0;">
            <button onclick="adjustPoints(-1)" class="round-btn">-</button>
            <input type="number" id="pts-to-redeem" value="1" readonly class="pts-box">
            <button onclick="adjustPoints(1)" class="round-btn">+</button>
        </div>
        <button class="btn-redeem" onclick="confirmRedeem()">CONFIRM</button>
        <button class="btn-insert back-btn" onclick="closeRedeemModal()">BACK</button>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

<script>
function toggleMenu(){
    const panel = document.getElementById("menu-panel");
    panel.style.display = (panel.style.display === "flex") ? "none" : "flex";
}
</script>

</body>
</html>
